services:
  - type: web
    name: kreditpass-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: bash render-build.sh
    startCommand: NODE_ENV=production node dist/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://kreditpass.org
      - key: SENDPULSE_API_ID
        sync: false
      - key: SENDPULSE_API_SECRET
        sync: false
      - key: SENDPULSE_FROM_EMAIL
        value: noreply@kreditpass.org
      - key: SENDPULSE_FROM_NAME
        value: KreditPass
      - key: RESEND_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /opt/render/project/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome
